    * {

    body {

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-item,
    .nav-dropbtn {
      color: white;
      text-decoration: none;
      font-size: 14px;
      background: none;
      border: none;
      cursor: pointer;
      font: inherit;
    }

    .nav-dropdown {
      position: relative;
    }

    .nav-dropdown-content {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      min-width: 180px;
      padding: 10px 0;
      background: rgba(10, 10, 13, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      flex-direction: column;
      gap: 0;
    }

    .nav-dropdown-content a {
      display: block;
      padding: 10px 14px;
      color: white;
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
    }

    .nav-dropdown-content a:hover,
    .nav-item:hover,
    .nav-dropbtn:hover {
      opacity: 0.8;
    }

    .nav-dropdown:hover .nav-dropdown-content,
    .nav-dropdown:focus-within .nav-dropdown-content {
      display: flex;
    }

    .nav-dropdown.open .nav-dropdown-content {
      display: flex;
    }

    .nav-dropdown.open .nav-dropdown-content {
      display: flex;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: radial-gradient(circle at 20% 20%, #0b0b0c, #0a0a0d);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero img {
      width: 160px;
      margin-bottom: 20px;
      border-radius: 0;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    .hero .subtitle {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .hero .tagline {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    /* ICONS */
    .icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      font-size: 22px;
      color: white;
      text-decoration: none;
      line-height: 1;
    }

    .icons img {
      width: 22px;
      height: 22px;
      display: block;
      object-fit: contain;
      margin-top: 22px;
    }

    /* BUTTON */

      display: inline-block;
      margin-top: 25px;
      padding: 10px 22px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
    }

    .resume-btn:hover {
      background: white;
      color: black;
    }

  <script>
    document.querySelectorAll('.nav-dropdown').forEach((dropdown) => {
      const button = dropdown.querySelector('.nav-dropbtn');
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        dropdown.classList.toggle('open');
      });
    });

    document.addEventListener('click', () => {
      document.querySelectorAll('.nav-dropdown.open').forEach((dropdown) => {
        dropdown.classList.remove('open');
      });
    });
  </script>
